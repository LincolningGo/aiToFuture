<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ATF Console</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.svg" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="bg-shape bg-shape-a"></div>
    <div class="bg-shape bg-shape-b"></div>

    <main class="page">
      <section class="hero reveal">
        <div class="brand-lockup">
          <img src="/atf-logo.svg" alt="ATF Logo" class="brand-logo" />
          <div class="brand-copy">
            <h1>ATF Console</h1>
            <p class="brand-subtitle">AI Workflow Console</p>
          </div>
        </div>
      </section>

      

      <section class="auth-layer hidden" id="authPanel">
        <div class="panel auth-panel reveal">
          <div class="auth-head">
            <h3>ATF</h3>
            <button id="closeAuthBtn" class="ghost compact" type="button">关闭</button>
          </div>

          <div class="tabs">
            <button class="tab active" data-tab="login" type="button">登录</button>
            <button class="tab" data-tab="register" type="button">注册</button>
          </div>

          <form id="loginForm" class="form active" autocomplete="off">
            <label>账号（用户名或邮箱）</label>
            <input name="account" required />
            <label>密码</label>
            <input name="password" type="password" required minlength="8" />
            <button type="submit">登录</button>
          </form>

          <form id="registerForm" class="form" autocomplete="off">
            <label>用户名</label>
            <input name="username" required minlength="3" maxlength="32" />
            <label>邮箱</label>
            <input name="email" type="email" required />
            <label>密码（至少 8 位）</label>
            <input name="password" type="password" required minlength="8" />
            <button type="submit">注册</button>
          </form>
        </div>
      </section>

      <section class="panel workspace reveal" id="workspace">
        <header class="workspace-head">
          <div class="workspace-brand">
            <img src="/atf-logo.svg" alt="ATF Logo" class="workspace-logo" />
            <div>
              <h2 id="welcomeText">ATF</h2>
            </div>
            <p id="pointsText"></p>
          </div>
          <div class="session-box">
            <p id="sessionHint" class="hint compact"></p>
            <button id="authActionBtn" class="ghost compact" type="button">账户</button>
          </div>
        </header>

        <div class="grid workspace-main">
          <div class="card card-form wide">
            <h3>生成任务</h3>
            <form id="generateForm">
              <label>能力类型</label>
              <select name="capability" id="capabilitySelect">
                <option value="text_to_image">文生图</option>
                <option value="image_to_image">图生图</option>
                <option value="text_to_video">文生视频</option>
                <option value="text_to_audio">文生语音</option>
                <option value="lyrics_generation">歌词生成</option>
                <option value="music_generation">音乐生成</option>
              </select>

              <label>模型选择</label>
              <div class="field-row">
                <select name="modelCode" id="modelSelect"></select>
                <button type="button" id="refreshModelsBtn" class="ghost compact">刷新模型</button>
              </div>

              <label>Prompt</label>
              <textarea
                name="prompt"
                id="promptInput"
                rows="4"
                required
                maxlength="1500"
                placeholder="输入内容"
              ></textarea>

              <div class="meta-row">
                <span class="hint" id="promptCounter">0 / 1500</span>
              </div>

              <div id="imageInputBox" class="hidden">
                <label>图生图输入图片</label>
                <input name="inputImage" type="file" accept="image/*" />
              </div>

              <div id="musicInputBox" class="hidden">
                <label>歌词</label>
                <textarea
                  name="lyrics"
                  id="lyricsInput"
                  rows="6"
                  maxlength="3500"
                  placeholder="可留空；留空时由模型自动生成歌词"
                ></textarea>
                <label class="checkbox-row">
                  <input type="checkbox" name="isInstrumental" id="instrumentalCheckbox" />
                  <span>纯音乐</span>
                </label>
              </div>

              <button type="submit" id="submitBtn">提交</button>
            </form>
            <p id="generateMsg" class="hint"></p>
          </div>
        </div>

        <div class="grid single">
          <div class="card wide">
            <div class="section-head">
              <div>
                <h3>任务记录</h3>
                <p id="historySummary" class="hint compact"></p>
              </div>
              <div class="pager">
                <button type="button" id="historyPrevBtn" class="ghost compact">上一页</button>
                <span id="historyPageInfo" class="pager-info">第 1 / 1 页</span>
                <button type="button" id="historyNextBtn" class="ghost compact">下一页</button>
              </div>
            </div>
            <div id="historyList" class="history history-jobs"></div>
          </div>
        </div>

        <div class="grid single">
          <div class="card wide">
            <div class="section-head">
              <div>
                <h3>积分流水</h3>
                <p id="ledgerSummary" class="hint compact"></p>
              </div>
              <div class="pager">
                <button type="button" id="ledgerPrevBtn" class="ghost compact">上一页</button>
                <span id="ledgerPageInfo" class="pager-info">第 1 / 1 页</span>
                <button type="button" id="ledgerNextBtn" class="ghost compact">下一页</button>
              </div>
            </div>
            <div id="ledgerList" class="history"></div>
          </div>
        </div>
      </section>

      <p id="globalMsg" class="global-msg"></p>
    </main>

    <div id="previewModal" class="preview-modal hidden">
      <div class="preview-backdrop" id="previewBackdrop"></div>
      <div class="preview-dialog">
        <div class="preview-head">
          <h3 id="previewTitle">预览</h3>
          <button id="previewCloseBtn" class="ghost compact" type="button">关闭</button>
        </div>
        <div id="previewBody" class="preview-body"></div>
      </div>
    </div>

    <script src="/app.js"></script>
  </body>
</html>

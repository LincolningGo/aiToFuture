<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ATF Console</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.svg" />
    <link rel="stylesheet" href="/styles.css?v=20260326f" />
  </head>
  <body>
    <div class="bg-shape bg-shape-a"></div>
    <div class="bg-shape bg-shape-b"></div>

    <main class="page">
      <section class="hero reveal">
        <div class="brand-lockup">
          <img src="/atf-logo.svg" alt="ATF Logo" class="brand-logo" />
          <div class="brand-copy">
            <h1>ATF Console</h1>
            <p class="brand-subtitle">AI Workflow Console</p>
          </div>
        </div>
      </section>

      

      <section class="auth-layer hidden" id="authPanel">
	        <div class="panel auth-panel reveal">
	          <div class="auth-head">
	            <div>
	              <h3>ATF</h3>
	              <p class="auth-subtitle">登录后可查看记录、积分与生成结果</p>
	            </div>
	            <button id="closeAuthBtn" class="ghost compact" type="button">关闭</button>
	          </div>

	          <div class="tabs">
	            <button class="tab active" data-tab="login" type="button">登录</button>
	            <button class="tab" data-tab="register" type="button">注册</button>
	          </div>

	          <p id="authMsg" class="form-msg hidden"></p>

	          <form id="loginForm" class="form active" autocomplete="off">
	            <label>账号（用户名或邮箱）</label>
	            <input
	              name="account"
	              required
	              placeholder="请输入用户名或邮箱"
	              autocomplete="username"
	              autocapitalize="none"
	              spellcheck="false"
	            />
	            <label>密码</label>
	            <input name="password" type="password" required minlength="8" placeholder="请输入密码" autocomplete="current-password" />
	            <div class="form-actions">
	              <button id="loginSubmitBtn" type="submit">登录</button>
	            </div>
	          </form>

	          <form id="registerForm" class="form" autocomplete="off">
	            <label>用户名</label>
	            <input
	              name="username"
	              required
	              minlength="3"
	              maxlength="32"
	              placeholder="3-32位，字母/数字/下划线"
	              autocomplete="username"
	              autocapitalize="none"
	              spellcheck="false"
	            />
	            <label>邮箱</label>
	            <input
	              name="email"
	              type="email"
	              required
	              placeholder="请输入常用邮箱"
	              autocomplete="email"
	              autocapitalize="none"
	              inputmode="email"
	              spellcheck="false"
	            />
	            <label>密码（至少 8 位）</label>
	            <input
	              name="password"
	              type="password"
	              required
	              minlength="8"
	              placeholder="建议使用高强度密码"
	              autocomplete="new-password"
	            />
	            <p class="form-note">注册成功后将自动登录。</p>
	            <div class="form-actions">
	              <button id="registerSubmitBtn" type="submit">注册</button>
	            </div>
	          </form>
	        </div>
	      </section>

	      <section class="panel workspace reveal" id="workspace">
	        <header class="workspace-head">
	          <div class="workspace-brand">
	            <img src="/atf-logo.svg" alt="ATF Logo" class="workspace-logo" />
            <div>
              <h2 id="welcomeText">ATF</h2>
            </div>
            <p id="pointsText"></p>
          </div>
	          <div class="session-box">
	            <p id="sessionHint" class="hint compact"></p>
	            <button id="authActionBtn" class="ghost compact" type="button">账户</button>
	          </div>
	        </header>

	        <div id="workspaceNav" class="workspace-nav hidden">
	          <button id="consoleNavBtn" class="nav-chip active" type="button">控制台</button>
	          <button id="adminNavBtn" class="nav-chip" type="button">用户管理</button>
	        </div>

	        <div id="consoleView">
	          <div class="grid workspace-main">
	            <div class="card card-form wide">
	              <h3>生成任务</h3>
	              <form id="generateForm">
	                <label>能力类型</label>
	                <select name="capability" id="capabilitySelect">
	                  <option value="text_to_image">文生图</option>
	                  <option value="image_to_image">图生图</option>
	                  <option value="text_to_video">文生视频</option>
	                  <option value="text_to_audio">文生语音</option>
	                  <option value="lyrics_generation">歌词生成</option>
	                  <option value="music_generation">音乐生成</option>
	                </select>

	                <label>模型选择</label>
	                <div class="field-row">
	                  <select name="modelCode" id="modelSelect"></select>
	                  <button type="button" id="refreshModelsBtn" class="ghost compact">刷新模型</button>
	                </div>

	                <label>Prompt</label>
	                <textarea
	                  name="prompt"
	                  id="promptInput"
	                  rows="4"
	                  required
	                  maxlength="1500"
	                  placeholder="输入内容"
	                ></textarea>

	                <div class="meta-row">
	                  <span class="hint" id="promptCounter">0 / 1500</span>
	                </div>

	                <div id="imageInputBox" class="hidden">
	                  <label>图生图输入图片</label>
	                  <input name="inputImage" type="file" accept="image/*" />
	                </div>

	                <div id="musicInputBox" class="hidden">
	                  <label>歌词</label>
	                  <textarea
	                    name="lyrics"
	                    id="lyricsInput"
	                    rows="6"
	                    maxlength="3500"
	                    placeholder="可留空；留空时由模型自动生成歌词"
	                  ></textarea>
	                  <label class="checkbox-row">
	                    <input type="checkbox" name="isInstrumental" id="instrumentalCheckbox" />
	                    <span>纯音乐</span>
	                  </label>
	                </div>

	                <button type="submit" id="submitBtn">提交</button>
	              </form>
	              <p id="generateMsg" class="hint"></p>
	            </div>
	          </div>

	          <div class="grid single">
	            <div class="card wide">
	              <div class="section-head">
	                <div>
	                  <h3>任务记录</h3>
	                  <p id="historySummary" class="hint compact"></p>
	                </div>
	                <div class="pager">
	                  <button type="button" id="historyPrevBtn" class="ghost compact">上一页</button>
	                  <span id="historyPageInfo" class="pager-info">第 1 / 1 页</span>
	                  <button type="button" id="historyNextBtn" class="ghost compact">下一页</button>
	                </div>
	              </div>
	              <div id="historyList" class="history history-jobs"></div>
	            </div>
	          </div>

	          <div class="grid single">
	            <div class="card wide">
	              <div class="section-head">
	                <div>
	                  <h3>积分流水</h3>
	                  <p id="ledgerSummary" class="hint compact"></p>
	                </div>
	                <div class="pager">
	                  <button type="button" id="ledgerPrevBtn" class="ghost compact">上一页</button>
	                  <span id="ledgerPageInfo" class="pager-info">第 1 / 1 页</span>
	                  <button type="button" id="ledgerNextBtn" class="ghost compact">下一页</button>
	                </div>
	              </div>
	              <div id="ledgerList" class="history"></div>
	            </div>
	          </div>
	        </div>

	        <section id="adminView" class="hidden admin-view">
	          <div class="grid single">
	            <div class="card wide">
	              <div class="section-head admin-head">
	                <div>
	                  <h3>用户管理</h3>
	                  <p id="adminSummary" class="hint compact"></p>
	                </div>
	                <button type="button" id="adminRefreshBtn" class="ghost compact">刷新用户</button>
	              </div>

	              <div class="admin-stats" id="adminStats">
	                <div class="stat-card">
	                  <span class="stat-label">总用户</span>
	                  <strong id="adminStatTotal">0</strong>
	                </div>
	                <div class="stat-card">
	                  <span class="stat-label">启用中</span>
	                  <strong id="adminStatActive">0</strong>
	                </div>
	                <div class="stat-card">
	                  <span class="stat-label">已禁用</span>
	                  <strong id="adminStatDisabled">0</strong>
	                </div>
	                <div class="stat-card">
	                  <span class="stat-label">超管</span>
	                  <strong id="adminStatSuper">0</strong>
	                </div>
	              </div>

	              <div class="admin-toolbar">
	                <input id="adminSearchInput" type="search" placeholder="搜索用户ID / 用户名 / 邮箱" />
	                <select id="adminRoleFilter">
	                  <option value="">全部角色</option>
	                  <option value="super_admin">超级管理员</option>
	                  <option value="user">普通用户</option>
	                </select>
	                <select id="adminStatusFilter">
	                  <option value="">全部状态</option>
	                  <option value="active">启用</option>
	                  <option value="disabled">禁用</option>
	                </select>
	                <button type="button" id="adminSearchBtn" class="ghost compact">查询</button>
	              </div>

	              <div id="adminUsersList" class="admin-users-list"></div>

	              <div class="section-foot">
	                <p id="adminUsersHint" class="hint compact"></p>
	                <div class="pager">
	                  <button type="button" id="adminUsersPrevBtn" class="ghost compact">上一页</button>
	                  <span id="adminUsersPageInfo" class="pager-info">第 1 / 1 页</span>
	                  <button type="button" id="adminUsersNextBtn" class="ghost compact">下一页</button>
	                </div>
	              </div>
	            </div>
	          </div>
	        </section>
	      </section>

      <p id="globalMsg" class="global-msg"></p>
    </main>

	    <div id="previewModal" class="preview-modal hidden">
      <div class="preview-backdrop" id="previewBackdrop"></div>
      <div class="preview-dialog">
        <div class="preview-head">
          <h3 id="previewTitle">预览</h3>
          <button id="previewCloseBtn" class="ghost compact" type="button">关闭</button>
        </div>
        <div id="previewBody" class="preview-body"></div>
      </div>
	    </div>

	    <div id="pointsModal" class="preview-modal hidden">
	      <div class="preview-backdrop" id="pointsBackdrop"></div>
	      <div class="preview-dialog admin-dialog">
	        <div class="preview-head">
	          <h3 id="pointsModalTitle">积分操作</h3>
	          <button id="pointsCloseBtn" class="ghost compact" type="button">关闭</button>
	        </div>
	        <p id="pointsTargetText" class="hint compact"></p>
	        <form id="pointsForm" class="admin-points-form">
	          <label>操作类型</label>
	          <select id="pointsActionSelect" name="action">
	            <option value="grant">发放积分</option>
	            <option value="deduct">扣减积分</option>
	          </select>
	          <label>积分数量</label>
	          <input id="pointsAmountInput" name="amount" type="number" min="1" step="1" required />
	          <label>原因说明</label>
	          <textarea id="pointsReasonInput" name="reason" rows="4" maxlength="255" placeholder="请输入本次操作原因"></textarea>
	          <p id="pointsFormMsg" class="form-msg hidden"></p>
	          <div class="form-actions inline-actions">
	            <button id="pointsSubmitBtn" type="submit">确认提交</button>
	          </div>
	        </form>
	      </div>
	    </div>

	    <div id="adminDetailModal" class="preview-modal hidden">
	      <div class="preview-backdrop" id="adminDetailBackdrop"></div>
	      <div class="preview-dialog admin-detail-dialog">
	        <div class="preview-head">
	          <h3 id="adminDetailTitle">用户详情</h3>
	          <button id="adminDetailCloseBtn" class="ghost compact" type="button">关闭</button>
	        </div>
	        <div id="adminDetailBody" class="admin-detail-body">
	          <p class="hint">加载中...</p>
	        </div>
	      </div>
	    </div>

	    <script src="/app.js?v=20260326f"></script>
  </body>
</html>
